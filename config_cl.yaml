allow_short: true
symbol: CL=F          # yfinance 连续合约（WTI 原油）
min_trades: 20
optimize_for: Sharpe Ratio

# MCL（微型原油）规格：100桶 × $1/桶 = $100/点
# 典型 ATR（日线）：$2-3/桶 → 止损 $300-450/MCL
# $100k 2% 风险：~4-5 手

timeframes:
  1d:
    symbol: CL=F
    start: '2020-01-01'
    end: '2026-06-22'
    interval: 1d

    cash: 100000
    commission: 2.0e-05
    margin: 0.07           # MCL SPAN margin ≈ $1,200，5手 = $6,000 = 6% of $100k
    n_contracts: 5
    contract_size: 100     # MCL: 100桶 × $1/桶

    ut_atr: 5
    ut_key: 2.5
    ssl_len: 40
    ssl2_len: 5
    ssl_mult: 0.35
    exit_len: 15
    rsi_len: 14
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 1.5
    ci_len: 14
    ci_threshold: 61.8
    adx_len: 14
    adx_threshold: 25.0
    vol_len: 20
    vol_mult: 1.0

    min_score: 3
    reversal_score: 3
    conflict_threshold: 2
    use_adx: true
    use_bbmc_dir: true
    use_ci: false
    use_vol: true
    use_squeeze_mr: false
    use_trend_filter: true
    trend_filter_len: 200
    allow_reversal_flip: true
    use_staged_tp: true
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    atr_sl_mult: 1.5
    tp1_portion: 0.34
    use_pattern_exit: false
    use_pattern_long_exit: false
    pattern_exit_score: 2
    divergence_lookback: 5
    pin_wick_ratio: 1.5
    double_bottom_lookback: 20
    double_bottom_atr_tol: 0.5
    use_vix_filter: false
    use_vix_entry: false
    vix_exit_threshold: 40.0
    vix_entry_threshold: 40.0

  4h:
    symbol: CL=F
    start: '2022-01-01'
    end: '2026-06-22'
    interval: 4h

    cash: 100000
    commission: 2.0e-05
    margin: 0.07
    n_contracts: 4
    contract_size: 100

    ut_atr: 5
    ut_key: 3.0
    ssl_len: 30
    ssl2_len: 10
    ssl_mult: 0.4
    exit_len: 20
    rsi_len: 14
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 1.5
    ci_len: 14
    ci_threshold: 61.8
    adx_len: 14
    adx_threshold: 25.0
    vol_len: 20
    vol_mult: 1.0

    min_score: 4
    reversal_score: 2
    conflict_threshold: 2
    use_adx: true
    use_bbmc_dir: true
    use_ci: true
    use_vol: true
    use_squeeze_mr: false
    use_trend_filter: false
    allow_reversal_flip: true
    use_staged_tp: true
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    atr_sl_mult: 1.5
    tp1_portion: 0.34
    use_pattern_exit: false
    use_pattern_long_exit: false
    pattern_exit_score: 2
    divergence_lookback: 5
    pin_wick_ratio: 1.5
    double_bottom_lookback: 20
    double_bottom_atr_tol: 0.5
    use_vix_filter: false
    use_vix_entry: false
    vix_exit_threshold: 40.0
    vix_entry_threshold: 40.0
