# ── 全局设置 ───────────────────────────────────────────────────────
symbol: "NQ=F"
allow_short: true
optimize_for: "Sharpe Ratio"   # Sharpe Ratio / Return [%] / Calmar Ratio
min_trades: 20                 # 每个周期至少需要的交易次数

# ── 各周期独立参数 ─────────────────────────────────────────────────
timeframes:

  1h:
    interval: "1h"
    start: "2025-01-01"
    end: "2026-06-07"
    data_file: "data/NQF_1h_2025-01-01_2026-06-07.csv"
    commission: 0.00002        # NQ期货 ~$4/手
    cash: 100000

    # ── ① UT Bot
    ut_key: 1.0
    ut_atr: 10
    # ── ② SSL Hybrid
    ssl_len: 20                # 1H 用较短周期
    ssl2_len: 5
    ssl_mult: 0.2
    # ── ③ RSI
    rsi_len: 14
    rsi_ob: 70
    rsi_os: 30
    # ── ④ MACD
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    # ── ⑤ Squeeze
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 1.5
    # ── ⑥ Confluence 门槛
    min_score: 4
    # ── ⑦ CI 过滤
    ci_len: 14
    ci_threshold: 61.8
    use_ci: true
    # ── ⑧ ADX 趋势强度（新）
    adx_len: 14
    adx_threshold: 20.0
    use_adx: true
    # ── ⑨ Volume 放量确认（新）
    vol_len: 20
    vol_mult: 1.2
    use_vol: true

  4h:
    interval: "4h"
    start: "2025-01-01"
    end: "2026-06-07"
    resample_from: "data/NQF_1h_2025-01-01_2026-06-07.csv"
    commission: 0.00002
    cash: 100000

    ut_key: 1.0
    ut_atr: 10
    ssl_len: 40                # 4H 用中等周期
    ssl2_len: 5
    ssl_mult: 0.2
    rsi_len: 14
    rsi_ob: 70
    rsi_os: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 1.5
    min_score: 5
    ci_len: 14
    ci_threshold: 61.8
    use_ci: true
    adx_len: 14
    adx_threshold: 22.0
    use_adx: true
    vol_len: 20
    vol_mult: 1.2
    use_vol: true

  1d:
    interval: "1d"
    start: "2020-01-01"
    end: "2026-06-07"
    data_file: "data/NQF_1d_2020-01-01_2026-06-07.csv"
    commission: 0.00002
    cash: 100000

    ut_key: 1.0
    ut_atr: 10
    ssl_len: 60                # 日线用原始较长周期
    ssl2_len: 5
    ssl_mult: 0.2
    rsi_len: 14
    rsi_ob: 70
    rsi_os: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 1.5
    min_score: 5
    ci_len: 14
    ci_threshold: 61.8
    use_ci: true
    adx_len: 14
    adx_threshold: 25.0
    use_adx: true
    vol_len: 20
    vol_mult: 1.5
    use_vol: true
