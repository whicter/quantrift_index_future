# ── Telegram 告警配置 ──────────────────────────────────────────────────
# 留空则不发告警；也可通过环境变量 TG_TOKEN / TG_CHAT_ID 配置
telegram:
  token: ""      # 格式: "1234567890:ABCdefGHIjklMNOpqrSTUvwxYZ"
  chat_id: ""    # 格式: "-100123456789"（群组加 -100 前缀）或 "123456789"（个人）

allow_short: true
min_trades: 20
optimize_for: Sharpe Ratio
symbol: NQ=F

# ── 仓位管理参数 ──────────────────────────────────────────────────────
# 每笔信号风险 = 账户净值 × risk_pct%（净值低于 equity_threshold 时所有TF统一使用）
risk_pct: 1.0

# 净值阈值：超过此值启用金字塔模式（各TF使用 risk_pct_pyramid）
# 净值必须在无持仓时测量（持仓期间锁定开仓时的净值）
equity_threshold: 60000
timeframes:
  1d:
    risk_pct_pyramid: 4.5   # 金字塔模式：1D强信号重仓（$120k≈5手，$200k≈8手）
    adx_len: 14
    adx_threshold: 20.0
    allow_reversal_flip: true
    atr_sl_mult: 1.5
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    cash: 100000
    ci_len: 14
    ci_threshold: 70.891
    commission: 2.0e-05
    conflict_threshold: 2
    contract_size: 2
    data_file: data/NQF_1d_2020-01-01_2026-06-07.csv
    end: '2026-06-07'
    exit_len: 15
    interval: 1d
    macd_fast: 12
    macd_signal: 8
    macd_slow: 26
    margin: 0.05
    min_score: 3
    n_contracts: 12
    reversal_score: 3
    rsi_len: 17
    rsi_mr_ob: 65.0
    rsi_mr_os: 34.9636
    rsi_ob: 70
    rsi_os: 30
    sqz_bbl: 20
    sqz_bbm: 1.9719
    sqz_kcl: 20
    sqz_kcm: 1.2974
    ssl2_len: 3
    ssl_len: 40
    ssl_mult: 0.3399
    start: '2020-01-01'
    tp1_portion: 0.34
    trend_filter_len: 200
    use_adx: true
    use_atr_exit: false
    use_bbmc_dir: true
    use_ci: false
    use_squeeze_mr: false
    use_staged_tp: true
    use_trend_filter: true
    use_vol: true
    ut_atr: 5
    ut_key: 3.0
    vol_len: 20
    vol_mult: 1.0
  1h:
    risk_pct_pyramid: 1.0   # 金字塔模式：1H试探轻仓（$120k≈2手，$200k≈3手）
