allow_short: true
symbol: ES=F
min_trades: 5
optimize_for: Sharpe Ratio

# ES E-mini S&P 500 期货
# 合约规格：$50/点（MES Micro = $5/点）
# 这里用 MES 模拟：contract_size=5, n_contracts=12
# = 12 MES × $5/点 = $60/点

timeframes:
  1d:
    data_file: data/ESF_1d_2020-01-01_2026-06-08.csv
    start: '2020-01-01'
    end: '2026-06-08'
    interval: 1d

    cash: 100000
    commission: 2.0e-05
    margin: 0.05
    n_contracts: 12
    contract_size: 5         # MES: $5/点

    # ── 信号参数（参考 NQ 1D 优化结果，ES 波动更小故 ut_key 偏小）
    ut_atr: 5
    ut_key: 2.0
    ssl_len: 40
    ssl2_len: 3
    ssl_mult: 0.3399
    exit_len: 15
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 8
    sqz_bbl: 20
    sqz_bbm: 1.9719
    sqz_kcl: 20
    sqz_kcm: 1.2974
    ci_len: 14
    ci_threshold: 70.891
    adx_len: 14
    adx_threshold: 20.0
    vol_len: 20
    vol_mult: 1.0

    min_score: 3
    reversal_score: 3
    conflict_threshold: 2
    use_adx: true
    use_bbmc_dir: true
    use_ci: false
    use_vol: true
    use_squeeze_mr: false
    use_trend_filter: true
    trend_filter_len: 200
    allow_reversal_flip: true
    use_staged_tp: true
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    atr_sl_mult: 1.5
    tp1_portion: 0.34
    use_pattern_exit: true
    use_pattern_long_exit: false
    pattern_exit_score: 2
    divergence_lookback: 5
    pin_wick_ratio: 1.5
    double_bottom_lookback: 20
    double_bottom_atr_tol: 0.5
    use_vix_filter: true
    vix_exit_threshold: 40.0
    use_vix_entry: true
    vix_entry_threshold: 40.0
    use_vix_mr: true
    vix_mr_lower: 30.0
    vix_mr_score: 2

  1h:
    data_file: data/ESF_1h_2024-06-10_2026-06-08.csv
    start: '2024-06-10'
    end: '2026-06-08'
    interval: 1h

    cash: 100000
    commission: 2.0e-05
    margin: 0.05
    n_contracts: 12
    contract_size: 5

    ut_atr: 8
    ut_key: 1.0
    ssl_len: 30
    ssl2_len: 10
    ssl_mult: 0.2238
    exit_len: 14
    rsi_len: 17
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 7
    sqz_bbl: 20
    sqz_bbm: 2.0
    sqz_kcl: 20
    sqz_kcm: 2.3753
    ci_len: 14
    ci_threshold: 61.8
    adx_len: 14
    adx_threshold: 20.0
    vol_len: 20
    vol_mult: 1.0

    min_score: 4
    reversal_score: 2
    conflict_threshold: 2
    use_adx: true
    use_bbmc_dir: true
    use_ci: true
    use_vol: true
    use_squeeze_mr: false
    use_trend_filter: false
    trend_filter_len: 200
    allow_reversal_flip: true
    use_staged_tp: true
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    atr_sl_mult: 1.5
    tp1_portion: 0.34
    use_atr_exit: false

  4h:
    data_file: data/ESF_4h_2024-06-10_2026-06-08.csv
    start: '2024-06-10'
    end: '2026-06-08'
    interval: 4h

    cash: 100000
    commission: 2.0e-05
    margin: 0.05
    n_contracts: 12
    contract_size: 5

    ut_atr: 5
    ut_key: 5.0
    ssl_len: 30
    ssl2_len: 13
    ssl_mult: 0.5
    exit_len: 17
    rsi_len: 19
    rsi_ob: 70
    rsi_os: 30
    rsi_mr_ob: 65.0
    rsi_mr_os: 35.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 10
    sqz_bbl: 20
    sqz_bbm: 2.3351
    sqz_kcl: 20
    sqz_kcm: 1.4778
    ci_len: 14
    ci_threshold: 61.3366
    adx_len: 14
    adx_threshold: 30.0
    vol_len: 20
    vol_mult: 1.0

    min_score: 5
    reversal_score: 2
    conflict_threshold: 2
    use_adx: true
    use_bbmc_dir: true
    use_ci: true
    use_vol: false
    use_squeeze_mr: false
    use_trend_filter: true
    trend_filter_len: 200
    allow_reversal_flip: true
    use_staged_tp: true
    atr_tp1_mult: 1.0
    atr_tp2_mult: 2.0
    atr_sl_mult: 1.5
    tp1_portion: 0.34
    use_atr_exit: false
